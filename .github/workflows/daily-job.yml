name: Daily stock alerts

on:
  schedule:
    # 00:00 UTC = 08:00 SGT. GitHub may delay scheduled runs by up to ~15 min.
    - cron: '0 0 * * *'
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: read

jobs:
  daily-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-job.txt

      - name: Install dependencies
        run: pip install -r requirements-job.txt

      - name: Run daily job
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_job.py
